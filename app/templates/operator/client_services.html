{% extends "base.html" %}
{% block title %}Услуги клиента {{ client.full_name }}{% endblock %}
{% block content %}
<h2>Услуги клиента: {{ client.full_name }} (договор {{ client.contract_number }})</h2>
<form method="POST">
    {{ csrf_token }}
    <div class="row">
        {% for service in services %}
        <div class="col-md-4 mb-2">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" name="services" value="{{ service.id }}" id="s{{ service.id }}"
                       {% if service.id in client_service_ids %}checked{% endif %}>
                <label class="form-check-label" for="s{{ service.id }}">
                    {{ service.name }} ({{ service.category.name if service.category else 'Без категории' }})
                </label>
            </div>
        </div>
        {% endfor %}
    </div>
    <button type="submit" class="btn btn-primary mt-3">Сохранить</button>
    <a href="{{ url_for('operator.clients') }}" class="btn btn-secondary mt-3">Назад</a>
</form>
{% endblock %}
